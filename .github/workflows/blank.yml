name: Workflow via Appsmith
on:
  repository_dispatch:
    types: [disparo_pelo_appsmith] 

jobs:
  executar_tarefa:
    runs-on: ubuntu-latest
    steps:
      - name: Log de Dados Recebidos
        run: |
          echo "Usuário que disparou: ${{ github.event.client_payload.usuario }}"
          echo "Servidor de Origem: ${{ github.event.client_payload.servidor }}"

      - name: Iniciar Contador de 30min
        run: |
          python3 -c "
          import time
          duracao_total = 30 * 60
          intervalo = 10
          
          print('--- INÍCIO DO MONITORAMENTO ---', flush=True)
          for i in range(0, duracao_total + 1, intervalo):
              print(f'MARCADOR: {i}s passados', flush=True)
              time.sleep(intervalo)
          print('--- TAREFA CONCLUÍDA ---', flush=True)
          "
    
      - name: Gravar Log no MariaDB
        if: always() # Garante que o log será salvo mesmo se o contador der erro
        run: |
          pip install pymysql
          python3 -c "
          import pymysql
          import os

          status_job = '${{ job.status }}'
          run_id = os.environ.get('GITHUB_RUN_ID')

          try:
              print('Conectando ao banco de dados...')
              conexao = pymysql.connect(
                  host=os.environ['DB_HOST'],
                  user=os.environ['DB_USER'],
                  password=os.environ['DB_PASSWORD'],
                  database=os.environ['DB_NAME'],
                  port=3306
              )
              cursor = conexao.cursor()
              
              sql = 'INSERT INTO logs_github_actions (run_id, status_final, mensagem) VALUES (%s, %s, %s)'
              valores = (run_id, status_job, 'Execução finalizada pelo GitHub Actions')
              
              cursor.execute(sql, valores)
              conexao.commit()
              print('Log gravado com sucesso!')
              
          except Exception as e:
              print(f'Erro ao gravar no banco: {e}')
              
          finally:
              if 'conexao' in locals() and conexao.open:
                  conexao.close()
          "
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
